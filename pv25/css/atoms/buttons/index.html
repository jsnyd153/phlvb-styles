<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta content="width=device-width, initial-scale=1" large bold="viewport" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Atoms - Buttons</title>
    <link rel="stylesheet" href="../../globals/normalize.css" />
    <link rel="stylesheet" href="../../globals/color_themes.css" />
    <link rel="stylesheet" href="../../globals/_index.css" />
    <link rel="stylesheet" href="css/index.css" />
  </head>

  <body>
    <div class="card">
      <img
        class="card-image"
        src="../../../media/placeholder-16x9.png"
        alt=""
      />
      <div class="card-content">
        <h4>Stream On: Unleashing Innovation with Data Streaming</h4>
        <p>
          Confluent VP of Developer Relations, Tim Berglund breaks down the
          fundamentals of data streaming and explains why every business has
          transformative data streaming use cases (even if they don’t know it
          yet).
        </p>
      </div>
    </div>

    <main class="" style="margin: 40px">
      <atomGrid>
        <div class="button-container">
          <a
            href="#"
            class="c25-button"
            button-size=""
            button-color="indigo"
            button-type="back"
          >
            <div class="button-text">Learn more</div>
            <div class="button-arrow">
              <svg
                viewBox="0 0 7 10"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <title>Arrow</title>
                <path d="M1.03125 1.1875L5.09375 5.25L1.03125 9.3125" />
              </svg>
            </div>
          </a>
        </div>
      </atomGrid>
    </main>

    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script> -->
    <script src="../../jquery.min.js"></script>
    <script src="js/controls.js"></script>
  </body>
</html>
